---
# --- Add Wazuh GPG key ---------------------------------------------------
- name: Add Wazuh GPG key
  shell: >
    curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH |
    gpg --no-default-keyring
    --keyring gnupg-ring:/usr/share/keyrings/wazuh.gpg
    --import &&
    chmod 644 /usr/share/keyrings/wazuh.gpg
  args:
    creates: /usr/share/keyrings/wazuh.gpg

# --- Add Wazuh apt repository --------------------------------------------
- name: Add Wazuh repository
  shell: >
    echo "deb [signed-by=/usr/share/keyrings/wazuh.gpg]
    https://packages.wazuh.com/4.x/apt/ stable main" |
    tee /etc/apt/sources.list.d/wazuh.list
  args:
    creates: /etc/apt/sources.list.d/wazuh.list

# --- Install Wazuh manager -----------------------------------------------
- name: Install Wazuh manager
  apt:
    name: wazuh-manager
    state: present
    update_cache: yes

# --- Deploy ossec.conf with active response enabled ----------------------
# Deploys configuration that blocks IPs after repeated SSH failures
- name: Deploy Wazuh manager configuration
  template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: root
    group: ossec
    mode: '0640'
  notify: Restart wazuh-manager

# --- Enable and start Wazuh manager --------------------------------------
- name: Enable and start Wazuh manager
  service:
    name: wazuh-manager
    state: started
    enabled: yes