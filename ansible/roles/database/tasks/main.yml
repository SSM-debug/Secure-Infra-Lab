---
- name: Install PostgreSQL and required packages
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Ensure PostgreSQL service is started and enabled
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Create database user
  postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    state: present
  become_user: postgres

- name: Create database
  postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"
    state: present
  become_user: postgres

- name: Deploy database schema
  template:
    src: schema.sql.j2
    dest: /tmp/schema.sql
    mode: '0644'

- name: Run database schema
  community.postgresql.postgresql_script:
    db: "{{ db_name }}"
    path: /tmp/schema.sql
  become_user: postgres

- name: Set PostgreSQL listen_addresses
  lineinfile:
    path: /etc/postgresql/14/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ webserver_ip }},{{ webserver2_ip }},127.0.0.1'"
    state: present
  notify: Restart postgresql

- name: Allow web1 in pg_hba.conf
  postgresql_pg_hba:
    dest: /etc/postgresql/14/main/pg_hba.conf
    contype: host
    databases: "{{ db_name }}"
    users: "{{ db_user }}"
    source: "{{ webserver_ip }}/32"
    method: md5
    state: present
  notify: Restart postgresql

- name: Allow web2 in pg_hba.conf
  postgresql_pg_hba:
    dest: /etc/postgresql/14/main/pg_hba.conf
    contype: host
    databases: "{{ db_name }}"
    users: "{{ db_user }}"
    source: "{{ webserver2_ip }}/32"
    method: md5
    state: present
  notify: Restart postgresql

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow web1 to reach PostgreSQL
  ufw:
    rule: allow
    src: "{{ webserver_ip }}"
    port: "5432"
    proto: tcp

- name: Allow web2 to reach PostgreSQL
  ufw:
    rule: allow
    src: "{{ webserver2_ip }}"
    port: "5432"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny