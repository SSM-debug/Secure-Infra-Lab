[defaults]
# Path to inventory file
inventory = /home/vagrant/ansible/inventory.ini

# Skip SSH host key verification — safe in local lab
host_key_checking = False

# Allow tmp files to be readable — required for become_user
allow_world_readable_tmpfiles = True

[ssh_connection]
# Pipelining eliminates world-readable tmp files warning
# Requires Defaults !requiretty in /etc/sudoers (configured by security_hardening role)
pipelining = True