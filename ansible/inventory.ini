# ─── Control node ────────────────────────────────────────────
# Control kör Ansible lokalt - ingen SSH-nyckel behövs
[control_g]
control ansible_host=192.168.56.10 ansible_connection=local ansible_python_interpreter=/usr/bin/python3

# ─── Load balancer ───────────────────────────────────────────
# Använder Vagrants nyckel kopierad till lokal SSH-mapp med rätt rättigheter (0600)
[nginx_g]
nginx ansible_host=192.168.56.11 ansible_user=vagrant ansible_private_key_file=/home/vagrant/.ssh/nginx_key ansible_python_interpreter=/usr/bin/python3

# ─── Web server 1 ────────────────────────────────────────────
[webserver_g]
web1 ansible_host=192.168.56.12 ansible_user=vagrant ansible_private_key_file=/home/vagrant/.ssh/web1_key ansible_python_interpreter=/usr/bin/python3

# ─── Web server 2 ────────────────────────────────────────────
[webserver2_g]
web2 ansible_host=192.168.56.13 ansible_user=vagrant ansible_private_key_file=/home/vagrant/.ssh/web2_key ansible_python_interpreter=/usr/bin/python3

# ─── Database server ─────────────────────────────────────────
[database_g]
database ansible_host=192.168.56.14 ansible_user=vagrant ansible_private_key_file=/home/vagrant/.ssh/database_key ansible_python_interpreter=/usr/bin/python3

# ─── Monitor server ──────────────────────────────────────────
[monitor_g]
monitor ansible_host=192.168.56.15 ansible_user=vagrant ansible_private_key_file=/home/vagrant/.ssh/monitor_key ansible_python_interpreter=/usr/bin/python3

# ─── All hosts grouped ───────────────────────────────────────
[all:children]
control_g
nginx_g
webserver_g
webserver2_g
database_g
monitor_g