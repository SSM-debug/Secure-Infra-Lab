---
# ─── Security hardening — all servers ───────────────────────
# Run first — harden every VM before installing services
- name: Apply security hardening to all servers
  hosts: all
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  roles:
    - security_hardening

# ─── Database ────────────────────────────────────────────────
# Database must be configured before web servers start
- name: Configure database server
  hosts: database_g
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  roles:
    - database

# ─── Web server 1 ────────────────────────────────────────────
- name: Configure web server 1
  hosts: webserver_g
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  roles:
    - flask

# ─── Web server 2 ────────────────────────────────────────────
- name: Configure web server 2
  hosts: webserver2_g
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  vars:
    server_name: "Server 2"
  roles:
    - flask

# ─── Load balancer ───────────────────────────────────────────
# nginx configured last — web1 and web2 must exist first
- name: Configure nginx load balancer
  hosts: nginx_g
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  roles:
    - nginx

# ─── Wazuh Manager ───────────────────────────────────────────
# Install Wazuh Manager and Dashboard on monitor
- name: Configure Wazuh Manager
  hosts: monitor_g
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  roles:
    - wazuh_manager

# ─── Wazuh Agent — all servers except monitor ────────────────
# Install Wazuh Agent on control, nginx, web1, web2, database
- name: Configure Wazuh agents
  hosts: control_g:nginx_g:webserver_g:webserver2_g:database_g
  become: true
  vars_files:
    - vars/vars.yml
    - secrets.yml
  roles:
    - wazuh_agent